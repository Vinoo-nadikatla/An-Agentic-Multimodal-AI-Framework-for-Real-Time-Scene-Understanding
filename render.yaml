services:
  - type: web
    name: vision-assistant
    runtime: python
    region: oregon
    plan: starter

    buildCommand: |
      pip install -r backend/requirements.txt
      cd frontend && npm install && npm run build

    startCommand: cd backend && python main.py

    envVars:
      - key: PORT
        value: 8000
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"
